<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 11 Experience Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #0078d4;
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 800px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, #0078d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            opacity: 0.7;
            margin-bottom: 3rem;
        }
        .choices {
            display: flex;
            gap: 30px;
            justify-content: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            width: 300px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: white;
        }
        .card:hover {
            transform: translateY(-10px);
            background: rgba(0, 120, 212, 0.1);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .card h2 {
            margin-top: 0;
            color: var(--accent);
        }
        .card p {
            font-size: 0.9rem;
            margin-bottom: 0;
            height: 60px;
        }
        .icon {
            font-size: 50px;
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Windows 11 Project</h1>
        <p>エミュレーター(VirtualBox)またはシミュレーターを選択してください</p>
        
        <div class="choices">
            <a href="win11.html" class="card">
                <span class="icon">📦</span>
                <h2>VirtualBox Web</h2>
                <p>ブラウザで本物のWindows 11を動かす。クラウドストレージ対応、ISO選択可能。</p>
            </a>
            
            <a href="https://turbowarp.org/editor" target="_blank" class="card">
                <span class="icon">🕹️</span>
                <h2>Simulator</h2>
                <p>TurboWarpを使用した高速なUIシミュレーター。軽量でスムーズに動作します。</p>
            </a>
        </div>
    </div>
</body>
</html>
