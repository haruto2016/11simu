<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VirtualBox Web - Portable Edition</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --sidebar-bg: rgba(25, 25, 25, 0.85);
            --main-bg: #1e1e1e;
            --accent: #0078d4;
            --accent-hover: #005a9e;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(40, 40, 40, 0.7);
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text); height: 100vh; overflow: hidden; display: flex; }
        .sidebar { width: 320px; background: var(--sidebar-bg); backdrop-filter: blur(20px); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
        .vm-list { flex: 1; overflow-y: auto; padding: 15px; }
        .vm-item { display: flex; align-items: center; gap: 15px; padding: 12px 15px; border-radius: 10px; cursor: pointer; transition: all 0.2s ease; margin-bottom: 8px; }
        .vm-item.active { background: rgba(0, 120, 212, 0.15); border: 1px solid var(--accent); }
        .main-stage { flex: 1; display: flex; flex-direction: column; background: #121212; }
        .toolbar { height: 64px; background: var(--glass); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 10px; }
        .tool-btn { background: transparent; border: none; color: var(--text); padding: 8px 16px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .tool-btn.primary { background: var(--accent); }
        .details-view { flex: 1; padding: 40px; overflow-y: auto; }
        .vm-display-container { display: none; width: 100%; height: 100%; background: #000; border-radius: 12px; position: relative; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        .status-bar { height: 32px; background: var(--accent); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; font-size: 0.75rem; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal.show { display: flex; }
        .modal-content { background: #252525; width: 500px; padding: 30px; border-radius: 16px; border: 1px solid var(--border); }
        input, select { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: white; margin-top: 5px; }
        .btn-group { display: flex; justify-content: flex-end; gap: 12px; margin-top: 30px; }
        .btn { padding: 10px 24px; border-radius: 8px; cursor: pointer; border: none; }
        .btn-primary { background: var(--accent); color: white; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header"><span>📦</span> VirtualBox PORTABLE</div>
        <div class="vm-list">
            <div class="vm-item active">
                <div style="font-size: 24px;">🪟</div>
                <div style="display:flex; flex-direction:column;">
                    <span style="font-weight:500;">Windows 11</span>
                    <span style="font-size:0.8rem; opacity:0.6;" id="vm-status-text">電源オフ</span>
                </div>
            </div>
        </div>
        <div style="padding: 20px; border-top: 1px solid var(--border);">
            <div style="font-size: 0.7rem; color: #00ff00; text-align: center;">LOCAL STORAGE MODE</div>
        </div>
    </aside>

    <main class="main-stage">
        <header class="toolbar">
            <button class="tool-btn" onclick="uploadISO()"><span>📀</span><span>ISO読込</span></button>
            <div style="width: 1px; height: 30px; background: var(--border);"></div>
            <button class="tool-btn primary" id="start-btn" onclick="startVM()"><span>▶️</span><span>起動</span></button>
            <button class="tool-btn" id="stop-btn" onclick="stopVM()" disabled><span>⏹️</span><span>停止</span></button>
            <div style="flex: 1;"></div>
            <span id="current-iso-name" style="font-size: 0.8rem; opacity: 0.6;">ISO未選択</span>
        </header>

        <section class="details-view">
            <div id="vm-details">
                <h1 style="font-size: 2.5rem; margin-bottom: 20px;">Windows 11</h1>
                <div style="background: rgba(255,255,255,0.03); padding: 25px; border-radius: 12px; border: 1px solid var(--border);">
                    <h3>システム構成</h3>
                    <p style="margin-top:10px; opacity:0.7;">メモリー: 512 MB (ブラウザ最適化)</p>
                    <p style="opacity:0.7;">ストレージ: Browser IndexedDB</p>
                </div>
            </div>
            <div class="vm-display-container" id="vm-display-container">
                <canvas id="screen"></canvas>
            </div>
        </section>

        <footer class="status-bar">
            <span id="stat-text">READY</span>
            <span>📦 STANDALONE EDITION</span>
        </footer>
    </main>

    <script>
        /* Inlined libv86.js logic or reference */
    </script>
    <script src="v86/libv86.js"></script>
    <script>
        let emulator = null;
        let isoObjectURL = null;

        async function startVM() {
            document.getElementById('vm-details').style.display = 'none';
            document.getElementById('vm-display-container').style.display = 'block';
            document.getElementById('start-btn').disabled = true;
            document.getElementById('stop-btn').disabled = false;

            const settings = {
                canvas: document.getElementById("screen"),
                wasm_path: "v86/v86.wasm",
                bios: { url: "v86/seabios.bin" },
                vga_bios: { url: "v86/vgabios.bin" },
                memory_size: 512 * 1024 * 1024,
                autostart: true,
                cdrom: isoObjectURL ? { url: isoObjectURL } : { url: "https://copy.sh/v86/images/linux.iso" }
            };

            emulator = new V86(settings);
        }

        function stopVM() {
            if (emulator) emulator.stop();
            location.reload(); // Simplest way to reset standalone state
        }

        function uploadISO() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.iso';
            input.onchange = e => {
                const file = e.target.files[0];
                if (isoObjectURL) URL.revokeObjectURL(isoObjectURL);
                isoObjectURL = URL.createObjectURL(file);
                document.getElementById('current-iso-name').innerText = file.name;
                alert("ISO準備完了。起動ボタンを押してください。");
            };
            input.click();
        }
    </script>
</body>
</html>
